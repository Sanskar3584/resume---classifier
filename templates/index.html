<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Resume Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen font-sans">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">
        Resume Classifier
      </h1>

      <form method="POST" enctype="multipart/form-data" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Upload Resume (PDF or DOCX)</label
          >
          <input
            type="file"
            name="file"
            accept=".pdf,.docx"
            required
            class="mt-2 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition"
        >
          Analyse Resume
        </button>
      </form>

      {% if error %}
      <div class="mt-4 p-3 bg-red-100 text-red-700 rounded-md text-center">
        {{ error }}
      </div>
      {% endif %} {% if prediction %}
      <div
        class="mt-6 p-4 bg-green-50 border border-green-200 rounded-md text-center"
      >
        <h2 class="text-lg font-semibold text-green-800">
          Predicted Category:
        </h2>
        <p class="text-xl font-bold text-green-900 mt-1">{{ prediction }}</p>
      </div>
      {% endif %}
    </div>
  </body>
</html>
